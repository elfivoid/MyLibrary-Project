<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Library</title>
</head>
<body>
    <!-- Header -->
     <header class="app-header">
        <h1 class="app-title">My Library</h1>
        <button class="add-btn" id="add-book-btn">Add New Book</button>
     </header>
     <!-- Main -->
        <main> 
         <div class="modal-overlay" id="modal-overlay" aria-modal="true" aria-labelledby="modal-title">
           <div class="modal" id="modal">
             <div class="modal-header">
               <h2 id="modal-title">Add New Book</h2>
               <button class="close-btn" id="close-btn"><img src="close_icon.svg" alt="close-icon"></button>
             </div>
             <div class="modal-body">
           <div class="field">
             <label for="title-input">Title</label>
             <input type="text" id="title-input" required/>
           </div>
           <div class="field">
             <label for="author-input">Author</label>
             <input type="text" id="author-input" required/>
           </div>
           <div class="pages">
             <label for="pages-input">Pages</label>
             <input type="number" id="pages-input" min="1" required/>
           </div>
           <div class="checkbox-row">
             <input type="checkbox" id="read-check" required/>
             <label for="read-check">Read</label>
           </div>
         </div>
             <div class="modal-footer">
           <button id="cancel-btn" class="close-btn">cancel</button>
           <button id="submit-btn">add</button>
         </div>
             </div>
           </div>
         </div>
        <div class="book-items"></div>
      </main>
      <!-- Copyright -->
       <footer>
        <p>&copy; 2026 elfivoid. All rights reserved.</p>
       </footer>
<script defer src="script.js"></script>
</body>
</html>
